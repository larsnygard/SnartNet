name: Compile macOS

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compile-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Compile workspace
        run: cargo build --workspace --release

      - name: Upload macOS release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snartnet-macos-release
          path: |
            target/release/snartnet
            target/release/snartnet-desktop
          if-no-files-found: error
