name: Compile iPhone

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compile-iphone:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Compile core for iPhone
        run: cargo build -p snartnet-core --target aarch64-apple-ios --release

      - name: Upload iPhone core artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snartnet-iphone-core-release
          path: |
            target/aarch64-apple-ios/release/libsnartnet_core*
          if-no-files-found: error
