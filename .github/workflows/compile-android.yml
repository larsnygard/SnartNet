name: Compile Android

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/compile-android.yml'
      - 'android/**'
      - 'android-bridge/**'
      - 'core/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

permissions:
  contents: read

jobs:
  compile-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Install Android platform packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Compile core and Android bridge for Android
        run: |
          TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$TOOLCHAIN/aarch64-linux-android24-clang"
          export CC_aarch64_linux_android="$TOOLCHAIN/aarch64-linux-android24-clang"
          export AR_aarch64_linux_android="$TOOLCHAIN/llvm-ar"
          cargo build -p snartnet-core --target aarch64-linux-android
          cargo build -p snartnet-android-bridge --target aarch64-linux-android

      - name: Build debug APK
        working-directory: android
        run: |
          gradle --no-daemon :app:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: snartnet-android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
