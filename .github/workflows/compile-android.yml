name: Compile Android

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compile-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Compile core for Android
        run: |
          TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$TOOLCHAIN/aarch64-linux-android24-clang"
          export CC_aarch64_linux_android="$TOOLCHAIN/aarch64-linux-android24-clang"
          export AR_aarch64_linux_android="$TOOLCHAIN/llvm-ar"
          cargo build -p snartnet-core --target aarch64-linux-android --locked
